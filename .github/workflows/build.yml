name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Verify imports
        run: python -c "from app.views.main_window import Window; print('OK')"

      - name: Build executable
        run: pyinstaller --onefile --windowed --icon=logo.ico --name=Olib app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Olib-windows
          path: dist/Olib.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Olib-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Olib.exe
          generate_release_notes: true
